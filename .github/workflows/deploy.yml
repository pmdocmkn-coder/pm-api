name: Deploy .NET 8 API from main branch

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: 📦 Publish .NET app
        run: |
          dotnet publish ./Pm.csproj -c Release -r linux-x64 --self-contained true -o ./publish
          cp appsettings.Production.json ./publish/
          chmod +x ./publish/Pm

      - name: 🧹 Clean old publish folder on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            rm -rf /www/wwwroot/api.mknops.web.id/publish/*
            echo "✅ Folder publish lama dibersihkan"

      - name: 📤 Upload new files via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: "./publish/"
          target: "/www/wwwroot/api.mknops.web.id/publish/"
          strip_components: 1 # Biar gak bikin subfolder publish/publish
          overwrite: true

      - name: 🔧 Fix folder structure (jaga-jaga)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            # Kalau masih ada folder publish/publish, fix
            if [ -d "/www/wwwroot/api.mknops.web.id/publish/publish" ]; then
              echo "⚠️  Masih ada folder publish/publish, fixing..."
              mv /www/wwwroot/api.mknops.web.id/publish/publish/* /www/wwwroot/api.mknops.web.id/publish/
              rmdir /www/wwwroot/api.mknops.web.id/publish/publish
              echo "✅ Fixed"
            fi

      - name: ✅ Verify deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            echo "=== Cek Pm.dll ==="
            ls -la /www/wwwroot/api.mknops.web.id/publish/Pm.dll
            echo "=== Isi folder ==="
            ls -la /www/wwwroot/api.mknops.web.id/publish/

      - name: ♻️ Restart Application (aaPanel Supervisor)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            echo "Restarting application via aaPanel Supervisor..."
            
            # Tanpa perlu sudo kalau aplikasi berjalan dengan user yang sama
            killall dotnet || true
            killall Pm || true
            
            echo "✅ Aplikasi berhasil di-kill. Supervisor akan otomatis me-restart dalam 1-2 detik!"
            
            # Tampilkan proses saat ini untuk memastikan sudah re-start
            sleep 3
            echo "=== Status proses dotnet ==="
            ps aux | grep dotnet | grep -v grep || true
